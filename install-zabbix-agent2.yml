---
- name: Install Zabbix Agent via Role
  ansible.builtin.include_role:
    name: community.zabbix.zabbix_agent
  vars:
    ansible_distribution_major_version: "12"
    zabbix_agent_version: 7.0
    zabbix_agent2: true
    zabbix_agent_hostname: "bastion"
    zabbix_agent_listenip: "{{ ansible_host }}"
    zabbix_agent_server: 192.168.68.2
    zabbix_agent_serveractive: 192.168.68.2
    zabbix_agent_hostmetadata: "Bastion"
    zabbix_agent_host_state: present
...